<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuizMaster</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card auth-card">
            <h2 class="text-center" style="margin-bottom: 2rem;">Create an Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" placeholder="Choose a unique handle" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="Enter your email identity" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Create a secure password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Account</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--accent-primary); text-decoration: none;">Log In here</a>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                alert('Username is already registered!');
                return;
            }
            if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                alert('Email address is already registered!');
                return;
            }

            users.push({ username, email, password });
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('Registration completed successfully! Accessing login view.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
